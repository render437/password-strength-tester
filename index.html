<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Tester</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="content-wrapper">
        <div class="container">
            <h1>Password Strength Tester</h1>

            <div class="input-group">
                <label for="passwordInput">Enter Password:</label>
                <div class="password-wrapper">
                    <input type="password" id="passwordInput" placeholder="Type your password here">
                    <span class="password-toggle-icon" onclick="togglePasswordVisibility()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <button onclick="checkPassword()">Check Strength</button>

            <div id="result">
                <!-- Results will be displayed here -->
            </div>

            <div id="disclaimer">
                <p><strong>Disclaimer:</strong> Your password is processed securely in your browser. No data is sent to any server or stored.</p>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="https://github.com/render437/password-strength-tester/" target="_blank" class="repo-link-button">Go to Github Repository</a>
            </div>
            <p class="copyright-text">&copy; 2026 | created by render437</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
