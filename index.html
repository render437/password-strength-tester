<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Tester</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="input-box">
            <h1>Password Strength Tester</h1>
            <p>Enter your password below to see how strong it is.</p>
            <input type="password" id="passwordInput" placeholder="Enter password">
            <button id="checkButton">Check Strength</button>
            <div id="results" class="results-container">
                <h2>Results:</h2>
                <p id="strengthIndicator"></p>
                <p id="timeToCrack"></p>
                <div id="passwordInfo" class="password-info">
                    <h3>Password Analysis:</h3>
                    <p id="recommendations"></p>
                </div>
            </div>
        </div>
        <div class="footer-container">
            <p class="repo-link"><a href="https://github.com/render437/password-strength-tester/" target="_blank">Go to Github Repository</a></p>
            <p class="copyright">© 2026 | created by render437</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
